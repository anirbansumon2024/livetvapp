name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Detect and Fix Gradlew Issues
        run: |
          echo "🔎 Searching for gradlew..."
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "⚠️ gradlew missing! Generating wrapper..."
            # রিপোজিটরি কনফ্লিক্ট এড়াতে এখানে --no-daemon এবং প্রোজেক্ট প্রপার্টি ব্যবহার করা হয়েছে
            gradle wrapper --gradle-version 8.7 --distribution-type bin
            GRADLEW_PATH="./gradlew"
          else
            echo "✅ gradlew found at: $GRADLEW_PATH"
          fi

          chmod +x "$GRADLEW_PATH"
          echo "FINAL_GRADLEW_PATH=$GRADLEW_PATH" >> $GITHUB_ENV
          echo "WORKING_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          cd $WORKING_DIR
          # কনফ্লিক্ট ইগনোর করার জন্য সরাসরি এসেম্বল কমান্ড
          ./gradlew assembleDebug --stacktrace -Pandroid.useAndroidX=true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveTV-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7
