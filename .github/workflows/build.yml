name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Detect and Fix Gradlew Issues
        run: |
          echo "Checking for gradlew file..."
          # ফাইলটি আছে কি না তা খুঁজে বের করা
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)

          if [ -z "$GRADLEW_PATH" ]; then
            echo "⚠️ gradlew missing! Trying to generate it..."
            gradle wrapper
            GRADLEW_PATH="./gradlew"
          else
            echo "✅ gradlew found at: $GRADLEW_PATH"
          fi

          echo "Setting executable permission..."
          chmod +x "$GRADLEW_PATH"
          
          # পরবর্তী স্টেপের জন্য পাথ সেট করে রাখা
          echo "FINAL_GRADLEW_PATH=$GRADLEW_PATH" >> $GITHUB_ENV
          echo "WORKING_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          echo "Starting build in directory: $WORKING_DIR"
          cd $WORKING_DIR
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveTV-Debug-APK
          # এটি অটোমেটিক পাথ খুঁজে নেবে যদি আপনার প্রোজেক্ট সাব-ফোল্ডারে থাকে
          path: "**/build/outputs/apk/debug/app-debug.apk"
          retention-days: 7
